<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Book spine -->
  <rect x="5" y="4" width="4" height="24" rx="1.5" fill="#1a1a1a"/>

  <!-- Book cover -->
  <rect x="8" y="4" width="18" height="24" rx="1.5" fill="#1a1a1a"/>

  <!-- Pages (right edge) -->
  <rect x="23" y="5.5" width="2.5" height="21" rx="0.5" fill="#888" opacity="0.9"/>

  <!-- Page lines -->
  <line x1="12" y1="11" x2="21" y2="11" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="15" x2="21" y2="15" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="19" x2="18" y2="19" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Spine highlight -->
  <rect x="5" y="4" width="1.5" height="24" rx="0.75" fill="white" opacity="0.15"/>
</svg>
